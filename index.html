<title>AUTO ID TRAINING</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at top,
    #ffffff 0%,
    #e8f0ff 30%,
    #d6e4ff 100%);
}

/* =========================
MACHINE
========================= */

.machine{
  width:1400px;
  padding:30px;
  border-radius:35px;
  background:white;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  position:relative;
}

.title{
  text-align:center;
  font-size:60px;
  font-weight:bold;
  color:#c9a227;
  margin-bottom:30px;
}

/* =========================
MODE BUTTONS
========================= */

.mode{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:35px;
}

.mode button{
  padding:14px 30px;
  border:none;
  border-radius:14px;
  background:#efefef;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.mode .active{
  background:#c9a227;
  color:white;
}

/* =========================
SLOTS
========================= */

.slots{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.slot{
  width:420px;
  height:540px;
  background:white;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
  position:relative;
}

.slot img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:10px;
  transform:scale(1.15);
}

.label{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:#c9a227;
  color:white;
  padding:10px 20px;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
  white-space:nowrap;
  z-index:2;
}

/* =========================
RIGHT PANEL
========================= */

.right-panel{
  display:flex;
  align-items:center;
  gap:20px;
}

.side-controls{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

/* =========================
FUNCTION COUNTER
========================= */

.func-counter{
  width:140px;
  background:white;
  border-radius:20px;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.func-counter-label{
  color:#888;
  font-size:11px;
  font-weight:bold;
  text-transform:uppercase;
  letter-spacing:0.8px;
}

.func-counter-row{
  display:flex;
  align-items:center;
  gap:8px;
}

.func-counter-btn{
  width:34px;
  height:34px;
  border:none;
  border-radius:8px;
  background:#c9a227;
  color:white;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  transition:0.15s;
  padding-bottom:2px;
}

.func-counter-btn:hover{ background:#b8911f; }
.func-counter-btn:disabled{ background:#ddd; cursor:default; }

.func-counter-value{
  font-size:34px;
  font-weight:bold;
  color:#333;
  min-width:34px;
  text-align:center;
}

.func-pips{
  display:flex;
  gap:5px;
  margin-top:2px;
}

.func-pip{
  width:9px;
  height:9px;
  border-radius:50%;
  background:#ddd;
  transition:background 0.2s;
}

.func-pip.active{ background:#c9a227; }

/* =========================
COIN SLOT
========================= */

.coin-slot{
  width:140px;
  height:140px;
  border-radius:20px;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
  transition:0.15s;
}

.coin-slot.insert{ transform:scale(0.92); }

.coin-hole{
  width:70px;
  height:14px;
  background:#888;
  border-radius:10px;
}

.coin-text{
  margin-top:12px;
  color:#c9a227;
  font-weight:bold;
  font-size:14px;
}

.coin-slot:hover{
  cursor:url("coin.png") 24 24, pointer;
}

/* =========================
RESULT TEXT
========================= */

.result{
  margin-top:30px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#c9a227;
}

/* =========================
COIN EFFECT
========================= */

.coin-fx{
  position:fixed;
  width:28px;
  height:28px;
  background:url("coin.png") no-repeat center/contain;
  pointer-events:none;
  z-index:9999;
  animation:coinFloat 0.9s ease-out forwards;
}

@keyframes coinFloat{
  0%  { transform:translate(0,0) scale(1); opacity:1; }
  100%{
    transform:
      translate(calc(var(--x)*1px), calc(var(--y)*1px))
      scale(0.2);
    opacity:0;
  }
}

/* =========================
FULLSCREEN RESULT
========================= */

.fullscreen-result{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, #ffffff, #dfe8ff);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:20px;
  overflow:hidden;
  z-index:9999;
}

/* Column of rows */
.result-images{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:16px;         /* gap between row-1 and row-2 */
}

/* Each row */
.result-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

/* Individual card — size set by JS */
.result-card{
  flex-shrink:0;
  background:white;
  border-radius:22px;
  padding:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
  overflow:hidden;
}

.result-card img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

/* =========================
PLAY MODE BUTTONS
========================= */

.play-mode{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:25px;
}

.play-mode button{
  padding:12px 26px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  background:#efefef;
}

.play-mode .active-play{
  background:#4d7dff;
  color:white;
}

/* =========================
MANUAL SCREEN
========================= */

.manual-screen{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, #ffffff, #dfe8ff);
  z-index:9998;
  display:none;
  flex-direction:column;
  padding:18px;
  overflow-y:auto;
}

.manual-title{
  text-align:center;
  font-size:34px;
  font-weight:bold;
  color:#c9a227;
  margin-bottom:10px;
}

.manual-step{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:14px;
  color:#555;
}

/* =========================
MANUAL GRID
========================= */

.manual-grid{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  gap:6px;
  padding-bottom:20px;
}

@media (max-width:1600px){ .manual-grid{ grid-template-columns:repeat(8,1fr); } }
@media (max-width:1400px){ .manual-grid{ grid-template-columns:repeat(7,1fr); } }
@media (max-width:1200px){ .manual-grid{ grid-template-columns:repeat(6,1fr); } }
@media (max-width:1000px){ .manual-grid{ grid-template-columns:repeat(5,1fr); } }
@media (max-width: 800px){ .manual-grid{ grid-template-columns:repeat(4,1fr); } }
@media (max-width: 600px){ .manual-grid{ grid-template-columns:repeat(3,1fr); } }

/* =========================
MANUAL CARD
========================= */

.manual-card{
  cursor:pointer;
  transition:0.2s;
  overflow:hidden;
  border-radius:8px;
  position:relative;
}

.manual-card:hover{
  transform:scale(1.04);
  box-shadow:
    0 0 6px  rgba(255,215,0,0.9),
    0 0 14px rgba(255,215,0,0.7),
    0 0 28px rgba(255,215,0,0.5);
  z-index:2;
}

.manual-card img{
  width:100%;
  aspect-ratio:2.5 / 3.5;
  object-fit:contain;
  display:block;
  padding:2px;
}

/* Already-selected */
.manual-card.already-selected{
  pointer-events:none;
  opacity:0.55;
}

.manual-card.already-selected::after{
  content:"✓";
  position:absolute;
  inset:0;
  background:rgba(201,162,39,0.50);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.6em;
  font-weight:bold;
  color:white;
  text-shadow:0 2px 6px rgba(0,0,0,0.25);
}

/* =========================
BUTTONS
========================= */

#backBtn{
  padding:18px 40px;
  border:none;
  border-radius:15px;
  background:#c9a227;
  color:white;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
}

#cancelManualBtn{
  align-self:center;
  margin-top:16px;
  margin-bottom:10px;
  padding:14px 36px;
  border:none;
  border-radius:14px;
  background:#888;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.15s;
}

#cancelManualBtn:hover{ background:#666; }

</style>
</head>

<body>

<!-- MACHINE -->
<div class="machine">

  <div class="title">AUTO ID TRAINING</div>

  <div class="mode">
    <button id="srBtn" class="active">SR</button>
    <button id="btBtn">BT</button>
  </div>

  <div class="play-mode">
    <button id="autoModeBtn" class="active-play">AUTO MODE</button>
    <button id="manualModeBtn">MANUAL MODE</button>
  </div>

  <div class="slots">

    <div class="slot">
      <div class="label">Industry</div>
      <img id="industryImg" src="industry/cover.webp">
    </div>

    <div class="slot">
      <div class="label">Job Role</div>
      <img id="jobImg" src="jobrole/cover.webp">
    </div>

    <div class="right-panel">
      <div class="slot">
        <div class="label" id="funcLabel">SR Function</div>
        <img id="funcImg" src="sr/cover.webp">
      </div>

      <div class="side-controls">

        <div class="func-counter">
          <div class="func-counter-label">FUNCTIONS</div>
          <div class="func-counter-row">
            <button class="func-counter-btn" id="decreaseFuncBtn">−</button>
            <span class="func-counter-value" id="funcCountDisplay">1</span>
            <button class="func-counter-btn" id="increaseFuncBtn">+</button>
          </div>
          <div class="func-pips">
            <div class="func-pip active"></div>
            <div class="func-pip"></div>
            <div class="func-pip"></div>
            <div class="func-pip"></div>
            <div class="func-pip"></div>
          </div>
        </div>

        <div class="coin-slot" id="spinBtn">
          <div class="coin-hole"></div>
          <div class="coin-text">INSERT COIN</div>
        </div>

      </div>
    </div>

  </div>

  <div class="result" id="resultText">Insert coin to start</div>

</div>

<!-- MANUAL SCREEN -->
<div class="manual-screen" id="manualScreen">
  <div class="manual-title">MANUAL SELECTION</div>
  <div class="manual-step" id="manualStepText">Select Industry</div>
  <div class="manual-grid" id="manualGrid"></div>
  <button id="cancelManualBtn">✕ CANCEL</button>
</div>

<!-- FULLSCREEN RESULT -->
<div class="fullscreen-result" id="fullscreenResult">
  <div class="result-images" id="resultImages"></div>
  <button id="backBtn">BACK</button>
</div>

<!-- AUDIO -->
<audio id="spinSound"   preload="auto"><source src="sounds/spin.mp3"   type="audio/mpeg"></audio>
<audio id="resultSound" preload="auto"><source src="sounds/result.mp3" type="audio/mpeg"></audio>

<script>

/* ─── State ──────────────────────────────── */
let mode      = "SR";
let spinning  = false;
let playMode  = "AUTO";
let funcCount = 1;

let selectedIndustry = "";
let selectedJob      = "";
let selectedFuncs    = [];
let manualStep       = 0;

const fallbackImg = "industry/cover.webp";

/* ─── Image Arrays ───────────────────────── */

const industry = [
  "industry/1.webp","industry/2.webp","industry/3.webp",
  "industry/4.webp","industry/5.webp","industry/6.webp"
];

const job = [
  "jobrole/1.webp","jobrole/2.webp","jobrole/3.webp","jobrole/4.webp",
  "jobrole/5.webp","jobrole/6.webp","jobrole/7.webp","jobrole/8.webp",
  "jobrole/9.webp","jobrole/10.webp"
];

const sr = Array.from({length:26}, (_,i) => `sr/${i+1}.webp`);
const bt = Array.from({length:16}, (_,i) => `bt/${i+1}.webp`);

/* ─── Element References ─────────────────── */

const industryImg      = document.getElementById("industryImg");
const jobImg           = document.getElementById("jobImg");
const funcImg          = document.getElementById("funcImg");
const funcLabel        = document.getElementById("funcLabel");
const spinBtn          = document.getElementById("spinBtn");
const resultText       = document.getElementById("resultText");
const machine          = document.querySelector(".machine");
const fullscreenResult = document.getElementById("fullscreenResult");
const resultImages     = document.getElementById("resultImages");
const backBtn          = document.getElementById("backBtn");

const autoModeBtn     = document.getElementById("autoModeBtn");
const manualModeBtn   = document.getElementById("manualModeBtn");
const manualScreen    = document.getElementById("manualScreen");
const manualGrid      = document.getElementById("manualGrid");
const manualStepText  = document.getElementById("manualStepText");
const cancelManualBtn = document.getElementById("cancelManualBtn");

const funcCountDisplay = document.getElementById("funcCountDisplay");
const decreaseFuncBtn  = document.getElementById("decreaseFuncBtn");
const increaseFuncBtn  = document.getElementById("increaseFuncBtn");
const funcPips         = document.querySelectorAll(".func-pip");

/* ─── Safe Image ─────────────────────────── */
function safeImg(el){ el.onerror = () => { el.src = fallbackImg; }; }
safeImg(industryImg);
safeImg(jobImg);
safeImg(funcImg);

/* ─── SR / BT Toggle ─────────────────────── */

srBtn.onclick = () => {
  mode = "SR";
  srBtn.classList.add("active");
  btBtn.classList.remove("active");
  industryImg.src     = "industry/cover.webp";
  jobImg.src          = "jobrole/cover.webp";
  funcImg.src         = "sr/cover.webp";
  funcLabel.innerText = "SR Function";
};

btBtn.onclick = () => {
  mode = "BT";
  btBtn.classList.add("active");
  srBtn.classList.remove("active");
  industryImg.src     = "industry/cover.webp";
  jobImg.src          = "jobrole/cover.webp";
  funcImg.src         = "bt/cover.webp";
  funcLabel.innerText = "BT Function";
};

/* ─── Play Mode Toggle ───────────────────── */

autoModeBtn.onclick = () => {
  playMode = "AUTO";
  autoModeBtn.classList.add("active-play");
  manualModeBtn.classList.remove("active-play");
};

manualModeBtn.onclick = () => {
  playMode = "MANUAL";
  manualModeBtn.classList.add("active-play");
  autoModeBtn.classList.remove("active-play");
};

/* ─── Function Counter ───────────────────── */

function refreshCounter(){
  funcCountDisplay.textContent = funcCount;
  funcPips.forEach((pip, i) => pip.classList.toggle("active", i < funcCount));
  decreaseFuncBtn.disabled = (funcCount <= 1);
  increaseFuncBtn.disabled = (funcCount >= 5);
}

decreaseFuncBtn.onclick = () => { if(funcCount > 1){ funcCount--; refreshCounter(); } };
increaseFuncBtn.onclick = () => { if(funcCount < 5){ funcCount++; refreshCounter(); } };
refreshCounter();

/* ─── Utility ────────────────────────────── */

function rand(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

/* Pick N unique items (shuffle + slice) */
function pickUnique(arr, count){
  const n = Math.min(count, arr.length);
  return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
}

/* ─── Spin Animation ─────────────────────── */

function spinTo(img, arr, duration, finalResult = null){
  const target = finalResult !== null ? finalResult : rand(arr);
  return new Promise(resolve => {
    let speed   = 80;
    let elapsed = 0;
    const timer = setInterval(() => {
      img.onerror = () => { img.src = fallbackImg; };
      img.src = rand(arr);
      elapsed += speed;
      if(elapsed > duration * 0.5) speed += 15;
      if(elapsed >= duration){
        clearInterval(timer);
        img.onerror = () => { img.src = fallbackImg; };
        img.src = target;
        resolve(target);
      }
    }, speed);
  });
}

/* ─── Coin Burst ─────────────────────────── */

function spawnCoins(x, y){
  for(let i = 0; i < 10; i++){
    const coin = document.createElement("div");
    coin.className = "coin-fx";
    document.body.appendChild(coin);
    const angle    = Math.random() * Math.PI * 2;
    const distance = 80 + Math.random() * 80;
    coin.style.left = x + "px";
    coin.style.top  = y + "px";
    coin.style.setProperty("--x", Math.cos(angle) * distance);
    coin.style.setProperty("--y", Math.sin(angle) * distance);
    setTimeout(() => coin.remove(), 900);
  }
}

/* ─── Build a single result card ─────────── */

function makeCard(src, w, h){
  const card = document.createElement("div");
  card.className    = "result-card";
  card.style.width  = w + "px";
  card.style.height = h + "px";

  const img = document.createElement("img");
  img.src     = src;
  img.onerror = () => { img.src = fallbackImg; };

  card.appendChild(img);
  return card;
}

/* ─── Fullscreen Result ──────────────────── */
/*
  funcSrcs.length < 3  → single row  : [industry] [job] [func…]
  funcSrcs.length >= 3 → two rows:
      Row 1 : [industry] [job]
      Row 2 : [func1] [func2] … [funcN]
*/
function showFullscreenResult(indSrc, jobSrc, funcSrcs){

  resultImages.innerHTML = "";

  /* ── Layout constants ── */
  const CARD_RATIO = 420 / 540;   // portrait ≈ 0.778
  const GAP        = 15;          // gap between cards in a row  (px)
  const ROW_GAP    = 16;          // gap between row-1 and row-2 (matches CSS)
  const BTN_H      = 80;          // back-button + its gap
  const PAD        = 40;          // left+right body padding

  const availW = window.innerWidth  - PAD;
  const availH = window.innerHeight - BTN_H - 40; // 40 = top/bottom padding

  const useTwoRows = funcSrcs.length >= 3;

  if(!useTwoRows){

    /* ── Single row: industry + job + 1–2 funcs ── */
    const total  = 2 + funcSrcs.length;
    const perW   = Math.floor((availW - GAP * (total - 1)) / total);
    const maxW   = Math.floor(availH * CARD_RATIO);
    const cardW  = Math.min(perW, maxW);
    const cardH  = Math.min(availH, Math.floor(cardW / CARD_RATIO));

    const row = document.createElement("div");
    row.className = "result-row";

    [indSrc, jobSrc, ...funcSrcs].forEach(src =>
      row.appendChild(makeCard(src, cardW, cardH))
    );

    resultImages.appendChild(row);

  } else {

    /* ── Two rows ── */
    // Each row gets half the available height minus half the row-gap
    const rowH = Math.floor((availH - ROW_GAP) / 2);

    /* Row 1 — industry + job (2 cards) */
    const r1perW  = Math.floor((availW - GAP) / 2);
    const r1maxW  = Math.floor(rowH * CARD_RATIO);
    const r1CardW = Math.min(r1perW, r1maxW);
    const r1CardH = Math.min(rowH, Math.floor(r1CardW / CARD_RATIO));

    const row1 = document.createElement("div");
    row1.className = "result-row";
    [indSrc, jobSrc].forEach(src =>
      row1.appendChild(makeCard(src, r1CardW, r1CardH))
    );

    /* Row 2 — all function cards */
    const n       = funcSrcs.length;
    const r2perW  = Math.floor((availW - GAP * (n - 1)) / n);
    const r2maxW  = Math.floor(rowH * CARD_RATIO);
    const r2CardW = Math.min(r2perW, r2maxW);
    const r2CardH = Math.min(rowH, Math.floor(r2CardW / CARD_RATIO));

    const row2 = document.createElement("div");
    row2.className = "result-row";
    funcSrcs.forEach(src =>
      row2.appendChild(makeCard(src, r2CardW, r2CardH))
    );

    resultImages.appendChild(row1);
    resultImages.appendChild(row2);
  }

  machine.style.display          = "none";
  fullscreenResult.style.display = "flex";
}

/* ─── Reset to covers ────────────────────── */

function resetCovers(){
  industryImg.src      = "industry/cover.webp";
  jobImg.src           = "jobrole/cover.webp";
  funcImg.src          = mode === "SR" ? "sr/cover.webp" : "bt/cover.webp";
  resultText.innerText = "Insert coin to start";
}

/* ─── Spin / Coin Button ─────────────────── */

spinBtn.onclick = async () => {

  if(spinning) return;

  if(playMode === "MANUAL"){ startManualMode(); return; }

  spinning = true;

  spinBtn.classList.add("insert");
  setTimeout(() => spinBtn.classList.remove("insert"), 200);

  const rect = spinBtn.getBoundingClientRect();
  spawnCoins(rect.left + rect.width / 2, rect.top + rect.height / 2);

  spinSound.currentTime = 0;
  spinSound.play();
  resultText.innerText = "SPINNING...";

  const funcArr = mode === "SR" ? sr : bt;

  /* Pre-pick unique functions before animation */
  const pickedFuncs = pickUnique(funcArr, funcCount);

  /* Phase 1 — Industry & Job spin in parallel */
  const [finalInd, finalJob] = await Promise.all([
    spinTo(industryImg, industry, 2200),
    spinTo(jobImg,      job,      2200)
  ]);

  /* Phase 2 — Functions spin sequentially to pre-picked unique results */
  const finalFuncs = [];
  for(let i = 0; i < funcCount; i++){
    resultText.innerText = funcCount > 1
      ? `Spinning Function ${i + 1} / ${funcCount}...`
      : "SPINNING...";
    await spinTo(funcImg, funcArr, 1200, pickedFuncs[i]);
    finalFuncs.push(pickedFuncs[i]);
  }

  spinSound.pause();
  spinSound.currentTime = 0;
  resultSound.currentTime = 0;
  resultSound.play();
  resultText.innerText = "RESULT READY";

  setTimeout(() => showFullscreenResult(finalInd, finalJob, finalFuncs), 700);

  spinning = false;
};

/* ─── Back Button ────────────────────────── */

backBtn.onclick = () => {
  fullscreenResult.style.display = "none";
  machine.style.display = "block";
  resetCovers();
};

/* ─── Cancel Manual ──────────────────────── */

cancelManualBtn.onclick = () => {
  manualScreen.style.display = "none";
  machine.style.display = "block";
};

/* ─── Manual Mode ────────────────────────── */

function startManualMode(){
  machine.style.display      = "none";
  manualScreen.style.display = "flex";
  manualStep       = 0;
  selectedIndustry = "";
  selectedJob      = "";
  selectedFuncs    = [];
  showManualOptions();
}

function showManualOptions(){
  manualGrid.innerHTML = "";

  const totalSteps = 2 + funcCount;
  const stepNum    = manualStep + 1;
  const progress   = `Step ${stepNum} / ${totalSteps} — `;

  let arr   = [];
  let title = "";

  if(manualStep === 0){
    title = progress + "Select Industry";
    arr   = industry;
  } else if(manualStep === 1){
    title = progress + "Select Job Role";
    arr   = job;
  } else {
    const funcNum   = manualStep - 1;
    const typeLabel = mode === "SR" ? "SR" : "BT";
    title = progress + `Select ${typeLabel} Function ${funcNum} of ${funcCount}`;
    arr   = mode === "SR" ? sr : bt;
  }

  manualStepText.innerText = title;

  arr.forEach(imgPath => {

    const card = document.createElement("div");
    card.className = "manual-card";

    if(manualStep >= 2 && selectedFuncs.includes(imgPath)){
      card.classList.add("already-selected");
    } else {
      card.onclick = () => {
        if(manualStep === 0)      selectedIndustry = imgPath;
        else if(manualStep === 1) selectedJob      = imgPath;
        else                      selectedFuncs.push(imgPath);

        manualStep++;

        if(manualStep < 2 + funcCount){
          showManualOptions();
        } else {
          finishManualMode();
        }
      };
    }

    card.innerHTML = `<img src="${imgPath}" loading="lazy">`;
    manualGrid.appendChild(card);
  });
}

function finishManualMode(){
  manualScreen.style.display = "none";
  resultSound.currentTime = 0;
  resultSound.play();
  setTimeout(() => showFullscreenResult(selectedIndustry, selectedJob, selectedFuncs), 500);
}

</script>
